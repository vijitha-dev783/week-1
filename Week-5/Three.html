<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Analyzer Dashboard</title>
    <link rel="stylesheet" href="Three.css">
</head>
<body>
    <div class="container">
        <h1>Number Analyzer Dashboard</h1>
        <input type="number" id="numberInput" placeholder="Enter a number">
        <button id="analyzeBtn">Analyze</button>
        <div id="results">
            <p id="palindrome"></p>
            <p id="armstrong"></p>
            <p id="prime"></p>
            <p id="factorial"></p>
        </div>
    </div>
    <script src="Three.js"></script>
</body>
</html>
